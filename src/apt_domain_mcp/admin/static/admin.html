<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>apt-domain-mcp Admin</title>
<style>
  :root {
    --primary: #2563eb;
    --bg: #f8fafc;
    --surface: #ffffff;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 1rem; }
  .header button {
    padding: 0.375rem 0.75rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.8125rem;
    color: var(--text-secondary);
  }
  .content { padding: 1.5rem; max-width: 960px; margin: 0 auto; }
  .placeholder {
    text-align: center;
    padding: 3rem;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
<div class="header">
  <h1>apt-domain-mcp Admin</h1>
  <button onclick="logout()">Logout</button>
</div>
<div id="app" class="content">
  <div class="placeholder">
    <p>Admin dashboard (under construction)</p>
    <p style="margin-top:0.5rem;font-size:0.875rem">Step 2 will add complex list, document upload, and data management.</p>
  </div>
</div>
<script>
  async function logout() {
    await fetch('/admin/logout', { method: 'POST' });
    window.location.href = '/admin/login';
  }
</script>
</body>
</html>
